# Server
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/meetingmind
spring.datasource.username=meetingmind_user
spring.datasource.password=meetingmind_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.meetingmind=DEBUG

# Application
spring.application.name=MeetingMind API
app.version=0.0.1

# Mistral AI
mistral.api.key=${MISTRAL_API_KEY:}

# JWT (Secret in Produktion via Umgebungsvariable JWT_SECRET setzen!)
jwt.secret=${JWT_SECRET:meetingmind-dev-secret-please-change-0123456789-abcdefghijklmnop}
jwt.expiration-ms=86400000
