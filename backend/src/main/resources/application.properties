# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/meetingmind}
spring.datasource.username=${DATABASE_USERNAME:meetingmind_user}
spring.datasource.password=${DATABASE_PASSWORD:meetingmind_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.meetingmind=${MEETINGMIND_LOG_LEVEL:DEBUG}

# Application
spring.application.name=MeetingMind API
app.version=0.0.1

# Mistral AI
mistral.api.key=${MISTRAL_API_KEY:}

# JWT
# In Produktion unbedingt per Umgebungsvariable JWT_SECRET setzen.
jwt.secret=${JWT_SECRET:meetingmind-dev-secret-please-change-0123456789-abcdefghijklmnop}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
